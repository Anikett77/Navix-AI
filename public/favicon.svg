<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Main background gradient: deep navy to dark slate -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>

    <!-- Orange accent gradient for the plane -->
    <linearGradient id="planeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>

    <!-- Glow filter for the plane -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle inner glow on circle -->
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Clip to circle -->
    <clipPath id="circleClip">
      <circle cx="16" cy="16" r="15"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15.5" fill="url(#bgGrad)" stroke="#334155" stroke-width="0.5"/>

  <!-- Globe latitude lines (subtle) -->
  <g clip-path="url(#circleClip)" opacity="0.18" stroke="#94a3b8" stroke-width="0.5" fill="none">
    <!-- Horizontal latitude arcs -->
    <ellipse cx="16" cy="16" rx="15" ry="15"/>
    <ellipse cx="16" cy="16" rx="15" ry="10"/>
    <ellipse cx="16" cy="16" rx="15" ry="5"/>
    <!-- Vertical longitude arcs -->
    <ellipse cx="16" cy="16" rx="10" ry="15"/>
    <ellipse cx="16" cy="16" rx="5" ry="15"/>
    <!-- Center vertical line -->
    <line x1="16" y1="1" x2="16" y2="31"/>
    <!-- Center horizontal line -->
    <line x1="1" y1="16" x2="31" y2="16"/>
  </g>

  <!-- Outer ring accent -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#f97316" stroke-width="0.4" opacity="0.4"/>

  <!-- Airplane — pointing top-right at 45° angle, centered -->
  <g filter="url(#glow)" transform="translate(16,16) rotate(-35) translate(-8,-8)">
    <!-- Main fuselage -->
    <path d="M8 2 L10.5 8 L8 7.2 L5.5 8 Z" fill="url(#planeGrad)"/>
    <!-- Left wing -->
    <path d="M5.5 8 L1 11 L5 9.5 Z" fill="url(#planeGrad)" opacity="0.9"/>
    <!-- Right wing -->
    <path d="M10.5 8 L15 11 L11 9.5 Z" fill="url(#planeGrad)" opacity="0.9"/>
    <!-- Tail fin left -->
    <path d="M6.2 12.5 L4 14.5 L7 13 Z" fill="url(#planeGrad)" opacity="0.8"/>
    <!-- Tail fin right -->
    <path d="M9.8 12.5 L12 14.5 L9 13 Z" fill="url(#planeGrad)" opacity="0.8"/>
    <!-- Fuselage bottom -->
    <path d="M8 7.2 L7.2 14 L8 13 L8.8 14 Z" fill="url(#planeGrad)"/>
  </g>

  <!-- Small dot trail behind plane (speed effect) -->
  <g opacity="0.5">
    <circle cx="10" cy="20" r="0.8" fill="#fb923c"/>
    <circle cx="8"  cy="21.5" r="0.6" fill="#fb923c" opacity="0.7"/>
    <circle cx="6"  cy="22.8" r="0.4" fill="#fb923c" opacity="0.4"/>
  </g>

  <!-- Tiny star accents -->
  <circle cx="24" cy="7"  r="0.7" fill="#fbbf24" opacity="0.8"/>
  <circle cx="27" cy="12" r="0.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="5"  cy="10" r="0.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="22" cy="25" r="0.6" fill="#fbbf24" opacity="0.6"/>
</svg>
